services:
  mermaid-visualizer:
    build:
      context: ./Services/web/MermaidVisualizer
      dockerfile: Dockerfile
    container_name: mermaid-visualizer
    restart: unless-stopped
    ports:
      - "${MERMAID_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production

